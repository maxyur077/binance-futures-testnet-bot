<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Testnet — Trading Bot</title>
    <meta name="description" content="Place MARKET, LIMIT, STOP and Grid orders on Binance Futures USDT-M Testnet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    colors: {
                        surface: {
                            50: '#f8fafc',
                            100: '#0d1117',
                            200: '#161b22',
                            300: '#21262d',
                            400: '#30363d',
                            500: '#484f58',
                            600: '#6e7681',
                        },
                        accent: {
                            buy: '#00d26a',
                            'buy-dim': '#00d26a22',
                            sell: '#ff4757',
                            'sell-dim': '#ff475722',
                            blue: '#58a6ff',
                            'blue-dim': '#58a6ff18',
                            purple: '#bc8cff',
                            amber: '#f0b429',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(16px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(0, 210, 106, 0.1)' },
                            '50%': { boxShadow: '0 0 40px rgba(0, 210, 106, 0.25)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-surface-100 text-gray-200 font-sans min-h-screen antialiased">

    <div class="fixed inset-0 overflow-hidden pointer-events-none" id="bg-effects">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-accent-blue/5 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-accent-purple/5 rounded-full blur-3xl"></div>
    </div>

    <nav class="relative z-50 border-b border-surface-400/50 backdrop-blur-xl bg-surface-100/80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-buy to-accent-blue flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight text-white">Trading Bot</h1>
                        <p class="text-[10px] font-mono text-surface-600 -mt-0.5 tracking-widest uppercase">Binance Futures Testnet</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="connection-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-300/50 border border-surface-400/50 hover:bg-surface-400/50 transition-colors">
                        <svg class="w-4 h-4 text-surface-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4v-3.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                        <span class="text-xs font-medium text-surface-600">Connection</span>
                    </button>
                    <button id="disconnect-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-300/50 border border-surface-400/50 hover:bg-accent-sell/20 hover:text-accent-sell text-surface-600 transition-colors hidden">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        <span class="text-xs font-medium">Disconnect</span>
                    </button>
                    <div id="health-indicator" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-300/50 border border-surface-400/50">
                        <div class="w-2 h-2 rounded-full bg-surface-600 animate-pulse" id="health-dot"></div>
                        <span class="text-xs font-medium text-surface-600" id="health-text">Checking...</span>
                    </div>
                    <a href="/docs" target="_blank" class="text-xs font-medium text-surface-600 hover:text-accent-blue transition-colors duration-200">API Docs</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div class="flex gap-2 mb-8 p-1 bg-surface-200/80 backdrop-blur rounded-xl border border-surface-400/30 w-fit">
            <button class="tab-btn active px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200" data-tab="single" id="tab-single">
                Single Order
            </button>
            <button class="tab-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200" data-tab="grid" id="tab-grid">
                Grid Strategy
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">

            <div class="lg:col-span-3">
                <div id="panel-single" class="tab-panel">
                    <div class="bg-surface-200/60 backdrop-blur-xl rounded-2xl border border-surface-400/30 overflow-hidden shadow-2xl shadow-black/20">
                        <div class="px-6 py-4 border-b border-surface-400/30">
                            <h2 class="text-base font-semibold text-white">Place Order</h2>
                        </div>
                        <form id="order-form" class="p-6 space-y-5">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="relative">
                                    <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Symbol</label>
                                    <input type="text" id="symbol" class="input-field w-full" placeholder="Search symbol (e.g. BTCUSDT)" autocomplete="off" required>
                                    <div id="symbol-dropdown" class="absolute z-10 w-full mt-1 bg-surface-200 border border-surface-400/50 rounded-lg shadow-xl max-h-60 overflow-y-auto hidden custom-scrollbar"></div>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Order Type</label>
                                    <select id="order-type" class="input-field w-full" required>
                                        <option value="MARKET">Market</option>
                                        <option value="LIMIT">Limit</option>
                                        <option value="STOP_MARKET">Stop Market</option>
                                        <option value="STOP">Stop Limit</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-surface-600 mb-2 uppercase tracking-wider">Side</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <button type="button" id="btn-buy" class="side-btn side-buy active py-3 rounded-xl text-sm font-bold transition-all duration-200">
                                        BUY / LONG
                                    </button>
                                    <button type="button" id="btn-sell" class="side-btn side-sell py-3 rounded-xl text-sm font-bold transition-all duration-200">
                                        SELL / SHORT
                                    </button>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Quantity</label>
                                <input type="number" id="quantity" class="input-field w-full" placeholder="0.001" step="any" min="0" required>
                            </div>

                            <div id="price-group" class="hidden">
                                <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Price</label>
                                <input type="number" id="price" class="input-field w-full" placeholder="Enter limit price" step="any" min="0">
                            </div>

                            <div id="stop-price-group" class="hidden">
                                <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Stop Price</label>
                                <input type="number" id="stop-price" class="input-field w-full" placeholder="Enter trigger price" step="any" min="0">
                            </div>

                            <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl text-sm font-bold transition-all duration-300 submit-buy">
                                Place BUY Order
                            </button>
                        </form>
                    </div>
                </div>

                <div id="panel-grid" class="tab-panel hidden">
                    <div class="bg-surface-200/60 backdrop-blur-xl rounded-2xl border border-surface-400/30 overflow-hidden shadow-2xl shadow-black/20">
                        <div class="px-6 py-4 border-b border-surface-400/30">
                            <h2 class="text-base font-semibold text-white">Grid Strategy</h2>
                        </div>
                        <form id="grid-form" class="p-6 space-y-5">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="relative">
                                    <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Symbol</label>
                                    <input type="text" id="grid-symbol" class="input-field w-full" placeholder="Search symbol (e.g. BTCUSDT)" autocomplete="off" required>
                                    <div id="grid-symbol-dropdown" class="absolute z-10 w-full mt-1 bg-surface-200 border border-surface-400/50 rounded-lg shadow-xl max-h-60 overflow-y-auto hidden custom-scrollbar"></div>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-surface-600 mb-2 uppercase tracking-wider">Side</label>
                                    <div class="grid grid-cols-2 gap-2">
                                        <button type="button" id="grid-btn-buy" class="side-btn side-buy active py-2.5 rounded-lg text-xs font-bold transition-all duration-200">BUY</button>
                                        <button type="button" id="grid-btn-sell" class="side-btn side-sell py-2.5 rounded-lg text-xs font-bold transition-all duration-200">SELL</button>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Quantity per Level</label>
                                <input type="number" id="grid-quantity" class="input-field w-full" placeholder="0.001" step="any" min="0" required>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Lower Price</label>
                                    <input type="number" id="grid-lower" class="input-field w-full" placeholder="90000" step="any" min="0" required>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Upper Price</label>
                                    <input type="number" id="grid-upper" class="input-field w-full" placeholder="100000" step="any" min="0" required>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">Grid Levels</label>
                                <input type="number" id="grid-levels" class="input-field w-full" placeholder="5" min="2" max="50" required>
                                <div id="grid-preview" class="mt-3 hidden">
                                    <div class="text-xs text-surface-600 mb-2">Price levels preview:</div>
                                    <div id="grid-levels-preview" class="flex flex-wrap gap-1.5"></div>
                                </div>
                            </div>

                            <button type="submit" id="grid-submit-btn" class="w-full py-3.5 rounded-xl text-sm font-bold transition-all duration-300 submit-buy">
                                Execute Grid Strategy
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-surface-200/60 backdrop-blur-xl rounded-2xl border border-surface-400/30 overflow-hidden shadow-2xl shadow-black/20 sticky top-24">
                    <div class="px-6 py-4 border-b border-surface-400/30 flex items-center justify-between">
                        <h2 class="text-base font-semibold text-white">Order History</h2>
                        <button id="clear-history" class="text-xs text-surface-600 hover:text-accent-sell transition-colors">Clear</button>
                    </div>
                    <div id="order-history" class="p-4 space-y-3 max-h-[600px] overflow-y-auto custom-scrollbar">
                        <div class="flex flex-col items-center justify-center py-12 text-surface-500">
                            <svg class="w-12 h-12 mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <p class="text-sm">No orders yet</p>
                            <p class="text-xs text-surface-600 mt-1">Place an order to see results here</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] space-y-3"></div>

    <div id="loading-overlay" class="fixed inset-0 z-[90] bg-surface-100/60 backdrop-blur-sm hidden items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-2 border-surface-400 border-t-accent-blue rounded-full animate-spin"></div>
            <p class="text-sm font-medium text-surface-600" id="loading-text">Placing order...</p>
        </div>
    </div>

    <!-- Connection Modal -->
    <div id="connection-modal" class="fixed inset-0 z-[100] bg-surface-100/80 backdrop-blur-sm hidden items-center justify-center">
        <div class="bg-surface-200 rounded-2xl border border-surface-400/50 shadow-2xl p-6 w-full max-w-md mx-4 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-white">API Connection</h3>
                <button id="close-connection-modal" class="text-surface-600 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="connection-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">API Key</label>
                    <input type="text" id="api-key" class="input-field w-full" placeholder="Enter Binance Testnet API Key" required>
                </div>
                <div>
                    <label class="block text-xs font-medium text-surface-600 mb-1.5 uppercase tracking-wider">API Secret</label>
                    <input type="password" id="api-secret" class="input-field w-full" placeholder="Enter Binance Testnet API Secret" required>
                </div>
                <button type="submit" class="w-full py-3 mt-2 bg-accent-blue hover:bg-blue-400 text-white rounded-xl text-sm font-bold transition-all duration-300">
                    Save Connection
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js?v=2"></script>
</body>
</html>
